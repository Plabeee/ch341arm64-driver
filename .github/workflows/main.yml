name: Build Driver

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.preset }}
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        preset: ["arm64-debug", "arm64-release"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSVC ARM64 Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64_arm64

    - name: Configure CMake
      run: cmake --preset ${{ matrix.preset }} -DWDK_TARGET_ARCH=ARM64

    - name: Build Driver
      run: cmake --build build/${{ matrix.preset }}

    - name: Generate Catalog and Test-Sign
      shell: pwsh
      run: |
        $BuildPath = (Get-Item "build/${{ matrix.preset }}").FullName
        Copy-Item -Path "inf/ch341arm64.inf" -Destination "$BuildPath\"
        
        # 1. Create Test Certificate
        $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=CH341TestCert" -KeyUsage DigitalSignature -FriendlyName "CH341 Test Cert" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
        Export-Certificate -Cert $cert -FilePath "$BuildPath\CH341Test.cer"
        
        # 2. DEBUG: List all available Inf2Cat versions
        Write-Host "--- Searching for Inf2Cat ---"
        $AllInf2Cats = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x86\inf2cat.exe" -Recurse
        foreach ($bin in $AllInf2Cats) {
            Write-Host "Found: $($bin.FullName)"
        }
        
        # Use the most recent version found
        $Inf2Cat = ($AllInf2Cats | Sort-Object LastWriteTime | Select-Object -Last 1).FullName
        Write-Host "--- Using Inf2Cat: $Inf2Cat ---"
        
        # 3. DEBUG: Check supported OS list (if possible)
        # Note: Inf2Cat doesn't have a clear '--help' for OS, but we can try to run it with a dummy OS to see the error list
        
        # 4. Generate Catalog
        $proc = Start-Process -FilePath $Inf2Cat -ArgumentList "/driver:`"$BuildPath`" /os:10_ARM64 /verbose" -Wait -PassThru -RedirectStandardOutput "$BuildPath\inf2cat.log" -RedirectStandardError "$BuildPath\inf2cat.err"
        
        if ($proc.ExitCode -ne 0) {
            Write-Host "Inf2Cat failed!"
            Write-Host "--- StdOut ---"
            Get-Content "$BuildPath\inf2cat.log" | Out-Host
            Write-Host "--- StdErr ---"
            Get-Content "$BuildPath\inf2cat.err" | Out-Host
            throw "Inf2Cat failed with exit code $($proc.ExitCode)"
        }
        
        $CatFile = Get-ChildItem "$BuildPath\*.cat" | Select-Object -First 1
        
        # 5. Sign
        $SignTool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Sort-Object LastWriteTime | Select-Object -Last 1 -ExpandProperty FullName
        & $SignTool sign /v /s My /n "CH341TestCert" /fd SHA256 /t http://timestamp.digicert.com "$BuildPath\ch341arm64.sys"
        & $SignTool sign /v /s My /n "CH341TestCert" /fd SHA256 /t http://timestamp.digicert.com "$($CatFile.FullName)"

    - name: Upload Driver Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ch341arm64-${{ matrix.preset }}
        path: |
          build/${{ matrix.preset }}/**/*.sys
          build/${{ matrix.preset }}/**/*.inf
          build/${{ matrix.preset }}/**/*.pdb
          build/${{ matrix.preset }}/**/*.cer
          build/${{ matrix.preset }}/**/*.cat
        if-no-files-found: error
