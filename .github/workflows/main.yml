name: Build Driver

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.preset }}
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        preset: ["arm64-debug", "arm64-release"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSVC ARM64 Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64_arm64

    - name: Configure CMake
      run: cmake --preset ${{ matrix.preset }} -DWDK_TARGET_ARCH=ARM64

    - name: Build Driver
      run: cmake --build build/${{ matrix.preset }}

    - name: Generate Catalog and Test-Sign
      shell: pwsh
      run: |
        $BuildPath = (Get-Item "build/${{ matrix.preset }}").FullName
        
        # Ensure the INF file is in the build folder so Inf2Cat can find it
        Copy-Item -Path "inf/ch341arm64.inf" -Destination "$BuildPath\"
        
        # Create Test Certificate
        $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=CH341TestCert" -KeyUsage DigitalSignature -FriendlyName "CH341 Test Cert" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
        Export-Certificate -Cert $cert -FilePath "$BuildPath\CH341Test.cer"
        
        # Explicitly find the LATEST Windows 10/11 Kit installed on the runner
        $KitVersion = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.0.*" | Sort-Object Name -Descending | Select-Object -First 1).Name
        $Inf2Cat = "C:\Program Files (x86)\Windows Kits\10\bin\$KitVersion\x86\inf2cat.exe"
        $SignTool = "C:\Program Files (x86)\Windows Kits\10\bin\$KitVersion\x64\signtool.exe"
        
        Write-Host "Using Inf2Cat: $Inf2Cat"
        Write-Host "Using SignTool: $SignTool"
        
        # Generate Catalog - wrap in cmd.exe to prevent powershell parsing errors with the /os argument
        Write-Host "Generating Catalog..."
        cmd.exe /c "`"$Inf2Cat`" /driver:`"$BuildPath`" /os:10_ARM64 /uselocaltime"
        if ($LASTEXITCODE -ne 0) { throw "Inf2Cat failed with exit code $LASTEXITCODE" }
        
        # Verify .cat exists before signing
        $CatFile = Get-ChildItem "$BuildPath\*.cat" | Select-Object -First 1
        if (-not $CatFile) { throw "Catalog file was not generated! Check your INF file for missing files." }
        
        # Sign the files - wrap in cmd.exe for safety
        Write-Host "Signing Driver..."
        cmd.exe /c "`"$SignTool`" sign /v /s My /n `"CH341TestCert`" /fd SHA256 /t http://timestamp.digicert.com `"$BuildPath\ch341arm64.sys`""
        cmd.exe /c "`"$SignTool`" sign /v /s My /n `"CH341TestCert`" /fd SHA256 /t http://timestamp.digicert.com `"$($CatFile.FullName)`""

    - name: Upload Driver Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ch341arm64-${{ matrix.preset }}
        path: |
          build/${{ matrix.preset }}/**/*.sys
          build/${{ matrix.preset }}/**/*.inf
          build/${{ matrix.preset }}/**/*.pdb
          build/${{ matrix.preset }}/**/*.cer
          build/${{ matrix.preset }}/**/*.cat
        if-no-files-found: error
