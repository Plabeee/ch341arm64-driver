name: Build Driver

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.preset }}
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        preset: ["arm64-debug", "arm64-release"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSVC ARM64 Environment
      # This action sets up the Visual Studio Developer Command Prompt.
      # arch: amd64_arm64 tells it to use the 64-bit host to compile for ARM64 target.
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64_arm64

    - name: Configure CMake
      # Now CMake will correctly find cl.exe instead of MinGW's cc.exe
      run: cmake --preset ${{ matrix.preset }}

    - name: Build Driver
      run: cmake --build build/${{ matrix.preset }}

    - name: Upload Driver Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ch341arm64-${{ matrix.preset }}
        path: |
          build/${{ matrix.preset }}/**/*.sys
          build/${{ matrix.preset }}/**/*.inf
          build/${{ matrix.preset }}/**/*.pdb
          build/${{ matrix.preset }}/**/*.cer
        if-no-files-found: error
